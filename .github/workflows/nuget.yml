name: Build and Publish NuGet

on:
    push:
        branches:
            - main
        tags:
            - v*
    pull_request:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore Vitimiti.SdlLogging.slnx

            - name: Build
              run: dotnet build Vitimiti.SdlLogging.slnx -c Release --no-restore

    publish:
        if: startsWith(github.ref, 'refs/tags/v')
        needs: validate
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x

            - name: Restore
              run: dotnet restore Vitimiti.SdlLogging.slnx

            - name: Pack
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  dotnet pack Vitimiti.SdlLogging/Vitimiti.SdlLogging.csproj \
                    -c Release \
                    --no-restore \
                    -o artifacts \
                    /p:ContinuousIntegrationBuild=true \
                    /p:Version="$VERSION"

            - name: Publish packages
              run: |
                  dotnet nuget push artifacts/*.nupkg \
                      --api-key "${{ secrets.NUGET_API_KEY }}" \
                      --source https://api.nuget.org/v3/index.json \
                      --skip-duplicate
                  dotnet nuget push artifacts/*.snupkg \
                      --api-key "${{ secrets.NUGET_API_KEY }}" \
                      --source https://api.nuget.org/v3/index.json \
                      --skip-duplicate
